<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créateur de Personnage Cthulhu</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-4 md:p-8">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-emerald-500 border-b border-emerald-900 pb-2">Générateur de Personnage</h1>
        
        <select id="selectCompetence" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-lg text-white mb-6 focus:ring-2 focus:ring-emerald-500 outline-none">
            <option value="">-- Choisir une compétence --</option>
        </select>

        <div id="details" class="bg-slate-900 p-6 rounded-lg border border-slate-700 hidden">
            <h2 id="compNom" class="text-2xl font-bold text-white mb-2"></h2>
            <p id="compStats" class="text-sm text-emerald-400 mb-4 font-mono"></p>
            <div id="niveauxList" class="grid gap-3"></div>
        </div>
    </div>

    <script>
        fetch('competences.json')
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById('selectCompetence');
                data.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.nom;
                    opt.textContent = c.nom;
                    select.appendChild(opt);
                });

                select.addEventListener('change', (e) => {
                    const comp = data.find(c => c.nom === e.target.value);
                    if (!comp) return;

                    document.getElementById('details').classList.remove('hidden');
                    document.getElementById('compNom').textContent = comp.nom;
                    document.getElementById('compStats').textContent = "Stats : " + comp.stats;
                    
                    const container = document.getElementById('niveauxList');
                    container.innerHTML = '';

                    for (const [nom, d] of Object.entries(comp.niveaux)) {
                        const div = document.createElement('div');
                        div.className = "bg-slate-800 p-3 rounded border border-slate-700 text-sm";
                        
                        let html = `<div class="font-bold text-white mb-1">${nom} <span class="text-slate-400 font-normal text-xs">(Coût: ${d.cout})</span></div>`;
                        if (d.bonus) html += `<div class="text-emerald-400">Bonus: +${d.bonus}</div>`;
                        // La condition ici gère proprement les malus pour ne pas afficher 0 ou null
                        if (d.malus && d.malus !== 0) html += `<div class="text-red-400">Malus: ${d.malus}</div>`;
                        if (d.description) html += `<div class="italic text-slate-400 mt-2 text-xs border-t border-slate-700 pt-1">${d.description}</div>`;
                        
                        div.innerHTML = html;
                        container.appendChild(div);
                    }
                });
            });
    </script>
</body>
</html>
